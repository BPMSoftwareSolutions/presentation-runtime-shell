<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MSP Command Center</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #08101d; color: #eef2ff; font-family: Inter, ui-sans-serif, system-ui, sans-serif; overflow: hidden; }

    .scene { height: 100%; display: grid; place-items: center; position: relative; }

    .grid-lines {
      position: absolute; inset: 0;
      background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0; animation: fade-in 1.5s 0.2s ease forwards;
    }

    .orb {
      position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0; animation: fade-in 2s ease forwards;
    }
    .orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(139,92,246,0.22), transparent 70%); top: -120px; left: -120px; animation-delay: 0.2s; }
    .orb-2 { width: 360px; height: 360px; background: radial-gradient(circle, rgba(59,130,246,0.18), transparent 70%); bottom: -80px; right: -80px; animation-delay: 0.5s; }

    .content { position: relative; z-index: 1; text-align: center; padding: 40px; max-width: 680px; }

    .eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 0.22em; color: #a78bfa; margin-bottom: 16px; opacity: 0; animation: slide-up 0.7s 0.6s ease forwards; }

    .title { font-size: clamp(30px, 5vw, 52px); font-weight: 700; line-height: 1.1; letter-spacing: -0.02em;
      background: linear-gradient(135deg, #eef2ff 0%, #a78bfa 55%, #818cf8 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      opacity: 0; animation: slide-up 0.9s 0.8s ease forwards; }

    .divider { width: 48px; height: 2px; background: linear-gradient(90deg, #8b5cf6, #a78bfa); border-radius: 2px; margin: 24px auto; opacity: 0; animation: slide-up 0.7s 1.0s ease forwards; }

    .subtitle { font-size: 15px; line-height: 1.7; color: #a8b3cf; opacity: 0; animation: slide-up 0.8s 1.1s ease forwards; }

    .badge-row { display: flex; justify-content: center; gap: 10px; margin-top: 28px; flex-wrap: wrap; opacity: 0; animation: slide-up 0.7s 1.3s ease forwards; }
    .badge { font-size: 12px; padding: 5px 14px; border-radius: 99px; border: 1px solid rgba(139,92,246,0.3); background: rgba(139,92,246,0.08); color: #a78bfa; letter-spacing: 0.04em; }

    @keyframes fade-in { to { opacity: 1; } }
    @keyframes slide-up { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="scene">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="grid-lines"></div>
    <div class="content">
      <p class="eyebrow">ACN &nbsp;·&nbsp; MSP Edition</p>
      <h1 class="title">Managed Service Operations,<br>Reimagined</h1>
      <div class="divider"></div>
      <p class="subtitle">One operator. Dozens of customers.<br>Real-time visibility across every tenant.</p>
      <div class="badge-row">
        <span class="badge">Multi-tenant</span>
        <span class="badge">Real-time detection</span>
        <span class="badge">AI-operated</span>
        <span class="badge">Automated playbooks</span>
      </div>
    </div>
  </div>
</body>
</html>
