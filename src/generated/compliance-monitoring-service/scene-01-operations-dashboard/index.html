<!doctype html>
<html lang='en'>
<head>
  <meta charset='UTF-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1.0' />
  <title>Operations Dashboard</title>
  <style>
    body { margin: 0; font-family: Segoe UI, Arial, sans-serif; background: #0b1220; color: #e5e7eb; }
    main { max-width: 960px; margin: 0 auto; min-height: 100vh; display: grid; align-content: center; gap: 14px; padding: 36px; }
    h1 { margin: 0; font-size: 2rem; }
    p { margin: 0; color: #cbd5e1; }
    ul { margin: 8px 0 0; padding-left: 20px; }
    li { margin: 6px 0; color: #bfdbfe; }
  </style>
</head>
<body>
  <main>
    <h1>Operations Dashboard</h1>
    <p>Morning command center for service, alerts, reports, and compliance tasks.</p>
    <ul>
      <li>Today: 3 visits scheduled</li>
      <li>Reports due: 2</li>
      <li>Compliance issues: 1 active</li>
      <li>Monitoring alerts: 4 open</li>
    </ul>
  </main>
</body>
</html>
