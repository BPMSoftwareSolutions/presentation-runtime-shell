<!doctype html>
<html lang='en'>
<head>
  <meta charset='UTF-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1.0' />
  <title>Compliance Tracker</title>
  <style>
    body { margin: 0; font-family: Segoe UI, Arial, sans-serif; background: #0b1220; color: #e5e7eb; }
    main { max-width: 960px; margin: 0 auto; min-height: 100vh; display: grid; align-content: center; gap: 14px; padding: 36px; }
    h1 { margin: 0; font-size: 2rem; }
    p { margin: 0; color: #cbd5e1; }
    ul { margin: 8px 0 0; padding-left: 20px; }
    li { margin: 6px 0; color: #bfdbfe; }
  </style>
</head>
<body>
  <main>
    <h1>Compliance Tracker</h1>
    <p>Inspection-readiness view for EPA, UST, threshold, and records.</p>
    <ul>
      <li>Requirement-level statuses</li>
      <li>Warning and alert visibility</li>
      <li>Evidence notes</li>
      <li>Export packet action</li>
    </ul>
  </main>
</body>
</html>
