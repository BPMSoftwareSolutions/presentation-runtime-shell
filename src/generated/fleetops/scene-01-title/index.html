<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FleetOps Title</title>
<style>
*{box-sizing:border-box;margin:0;padding:0} html,body{height:100%;overflow:hidden;background:#08101d;color:#eef2ff;font-family:Inter,ui-sans-serif,system-ui,sans-serif}
:root{--bg:#08101d;--surface:rgba(255,255,255,.04);--border:rgba(255,255,255,.09);--muted:#94a3b8;--violet:#a78bfa;--green:#10b981;--amber:#f59e0b;--red:#ef4444}
.scene{height:100%;position:relative;display:flex;align-items:center;justify-content:center;padding:54px}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);background-size:44px 44px}
.orb1,.orb2{position:absolute;border-radius:50%;filter:blur(100px)} .orb1{width:480px;height:480px;right:-120px;top:-140px;background:radial-gradient(circle, rgba(139,92,246,.18), transparent 70%)} .orb2{width:360px;height:360px;left:-100px;bottom:-100px;background:radial-gradient(circle, rgba(16,185,129,.14), transparent 70%)}
.wrap{position:relative;z-index:1;width:100%;max-width:1200px;height:100%;border:1px solid var(--border);border-radius:28px;background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));padding:44px;display:flex;flex-direction:column;justify-content:space-between}
.top{display:flex;justify-content:space-between;align-items:center}
.badge,.pill{border:1px solid rgba(167,139,250,.28);background:rgba(167,139,250,.08);color:#d8ccff;padding:10px 16px;border-radius:999px;font-size:13px;letter-spacing:.08em;text-transform:uppercase}
.brand{font-size:16px;color:#cad4ea;letter-spacing:.08em;text-transform:uppercase}
.hero{display:grid;grid-template-columns:1.4fr .9fr;gap:30px;align-items:center}
.kicker{color:var(--violet);font-size:14px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:18px}
.title{font-size:74px;line-height:1.02;font-weight:800;max-width:820px}
.subtitle{margin-top:20px;font-size:24px;line-height:1.45;color:var(--muted);max-width:820px;min-height:2.9em}
.side{border:1px solid var(--border);border-radius:24px;background:rgba(255,255,255,.04);padding:28px;display:grid;gap:18px}
.side .row{display:flex;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.06);padding-bottom:12px}.side .row:last-child{border-bottom:0;padding-bottom:0}
.lab{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em}
.val{font-size:18px;font-weight:700;min-height:1.4em}
.footer{display:flex;justify-content:space-between;align-items:end}
.quote{font-size:18px;color:#dce4f5;max-width:700px;line-height:1.6}
.cta{font-size:16px;color:var(--green)}
/* Typewriter cursor */
.tw-cursor{display:inline-block;width:2px;height:1em;background:currentColor;margin-left:2px;vertical-align:text-bottom;animation:blink .75s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
/* Quote pulse */
@keyframes quote-pulse{
  0%{text-shadow:none;color:#dce4f5}
  35%{text-shadow:0 0 28px rgba(167,139,250,.6),0 0 56px rgba(167,139,250,.28);color:#ede8ff}
  100%{text-shadow:0 0 8px rgba(167,139,250,.08);color:#dce4f5}
}
.quote-pulse{animation:quote-pulse .85s ease-out forwards}
/* Reveal */
[data-reveal]{opacity:0;transform:translateY(16px);animation:reveal .6s ease forwards}
@keyframes reveal{to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="scene">
  <div class="grid"></div>
  <div class="orb1"></div>
  <div class="orb2"></div>
  <div class="wrap">
    <div class="top">
      <div class="brand" data-reveal>FleetOps AI Command Center</div>
      <div class="badge" data-reveal>Demo Concept</div>
    </div>
    <div class="hero">
      <div>
        <div class="kicker" data-reveal>Uber Fleet + Sprinter Operations</div>
        <div class="title" data-reveal>From late-night calls to governed fleet operations.</div>
        <div class="subtitle" data-reveal id="subtitle"></div>
      </div>
      <div class="side" data-reveal id="side-card">
        <div class="row"><div class="lab">Owner</div><div class="val" id="val-0"></div></div>
        <div class="row"><div class="lab">Company</div><div class="val" id="val-1"></div></div>
        <div class="row"><div class="lab">Need</div><div class="val" id="val-2"></div></div>
        <div class="row"><div class="lab">Outcome</div><div class="val" id="val-3"></div></div>
      </div>
    </div>
    <div class="footer">
      <div class="quote" data-reveal id="footer-quote">"The business is already moving. The next step is building the command center that can govern it."</div>
      <div class="pill" data-reveal>FleetOps</div>
    </div>
  </div>
</div>
<script>
(function(){
  // Assign reveal stagger delays
  var revealEls = document.querySelectorAll('[data-reveal]');
  revealEls.forEach(function(e, i){
    e.style.animationDelay = (0.12 + i * 0.12) + 's';
  });

  // Map element IDs to their [data-reveal] index
  // Order: brand(0), badge(1), kicker(2), title(3), subtitle(4), side-card(5), footer-quote(6), pill(7)
  var REVEAL_DUR = 600; // ms, matches .6s animation

  function revealDelay(idx){ return (0.12 + idx * 0.12) * 1000; }

  // --- Typewriter helper ---
  // Writes text char by char into el. Inserts a blinking cursor while typing.
  function typewriter(el, text, msPerChar, onDone){
    el.textContent = '';
    var cursor = document.createElement('span');
    cursor.className = 'tw-cursor';
    el.appendChild(cursor);
    var i = 0;
    function tick(){
      if(i < text.length){
        var tn = document.createTextNode(text[i]);
        el.insertBefore(tn, cursor);
        i++;
        setTimeout(tick, msPerChar);
      } else {
        cursor.remove();
        if(onDone) onDone();
      }
    }
    tick();
  }

  // --- Subtitle typewriter ---
  // Fires after subtitle reveal animation completes
  var subtitleEl = document.getElementById('subtitle');
  var subtitleText = 'Real-time visibility, incident response, compliance logging, and playbooks for a Michigan transportation operation that has outgrown manual management.';
  var subtitleStart = revealDelay(4) + REVEAL_DUR;
  setTimeout(function(){
    typewriter(subtitleEl, subtitleText, 20, null);
  }, subtitleStart);

  // --- Side card value typewriters ---
  var sideValues = [
    'Adrian Cannon',
    'Cannon Transportation',
    'Governance + Control',
    'Sleep + Scale'
  ];
  var sideStart = revealDelay(5) + REVEAL_DUR;
  var valuePad = 400; // ms between each value starting

  sideValues.forEach(function(val, idx){
    setTimeout(function(){
      var el = document.getElementById('val-' + idx);
      typewriter(el, val, 30, null);
    }, sideStart + idx * valuePad);
  });

  // --- Footer quote pulse ---
  // Fires 400ms after the quote reveal animation completes
  var quoteEl = document.getElementById('footer-quote');
  var quoteStart = revealDelay(6) + REVEAL_DUR + 400;
  setTimeout(function(){
    quoteEl.classList.add('quote-pulse');
  }, quoteStart);
})();
</script>
</body>
</html>
