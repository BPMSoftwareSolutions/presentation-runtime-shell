<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Automatic Rebalance — The Hero Moment</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; background: #07111f; color: #edf4ff;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif; overflow: hidden;
    }
    body::before {
      content: ""; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.2));
      pointer-events: none;
    }

    .bg-orb {
      position: absolute; width: 500px; height: 500px; border-radius: 50%;
      filter: blur(100px); pointer-events: none;
      background: radial-gradient(circle, rgba(32,201,151,0.10), transparent 70%);
      bottom: -120px; right: -80px; opacity: 0;
      transition: opacity 1.2s ease;
    }
    .bg-orb.active { opacity: 1; }

    .scene { position: relative; height: 100%; display: flex; flex-direction: column; padding: 20px 24px; gap: 14px; }

    /* Header */
    .header {
      display: flex; align-items: center; gap: 12px; padding: 12px 18px;
      border-radius: 16px; border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      opacity: 0; animation: reveal 0.5s 0.1s ease forwards;
    }
    .header-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #56d8ff; box-shadow: 0 0 8px rgba(86,216,255,0.6);
      transition: background 0.5s, box-shadow 0.5s;
    }
    .header-dot.rebalancing { background: #f5b94c; box-shadow: 0 0 10px rgba(245,185,76,0.7); animation: pulse-dot 0.9s ease-in-out infinite; }
    .header-dot.done        { background: #20c997; box-shadow: 0 0 10px rgba(32,201,151,0.7); }
    @keyframes pulse-dot { 0%,100%{transform:scale(1)} 50%{transform:scale(1.5)} }

    .header-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.16em; font-weight: 800; color: #56d8ff; transition: color 0.4s; }
    .header-title.rebalancing { color: #f5b94c; }
    .header-title.done        { color: #20c997; }
    .spacer { flex: 1; }
    .status-badge { padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 700;
      border: 1px solid rgba(32,201,151,0.30); background: rgba(32,201,151,0.09); color: #20c997;
      transition: all 0.4s;
    }
    .status-badge.active { border-color: rgba(245,185,76,0.30); background: rgba(245,185,76,0.09); color: #f5b94c; }
    .status-badge.done { border-color: rgba(32,201,151,0.40); background: rgba(32,201,151,0.12); color: #20c997; }

    /* Main layout */
    .main { flex: 1; min-height: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    /* Groups panel */
    .groups-panel {
      border: 1px solid rgba(32,201,151,0.20); border-radius: 20px;
      background: linear-gradient(180deg, rgba(32,201,151,0.06), rgba(32,201,151,0.02));
      overflow: hidden; display: flex; flex-direction: column;
      opacity: 0; animation: reveal 0.6s 0.2s ease forwards;
    }
    .panel-header {
      display: flex; align-items: center; gap: 9px; padding: 12px 15px;
      border-bottom: 1px solid rgba(255,255,255,0.07); background: rgba(255,255,255,0.02);
    }
    .ph-dot { width: 7px; height: 7px; border-radius: 50%; background: #20c997; box-shadow: 0 0 7px rgba(32,201,151,0.55); }
    .ph-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.13em; font-weight: 800; color: #20c997; }
    .ph-count { margin-left: auto; font-size: 11px; color: #4d5f77; transition: all 0.3s; }
    .panel-body { padding: 12px; display: flex; flex-direction: column; gap: 6px; flex: 1; }

    .member-row {
      display: flex; align-items: center; gap: 8px; padding: 8px 10px;
      border-radius: 11px; border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.03);
      transition: border-color 0.5s, background 0.5s, box-shadow 0.5s;
    }
    .member-row--new {
      border-color: rgba(86,216,255,0.40); background: rgba(86,216,255,0.08);
      opacity: 0; transform: translateX(-10px);
      transition: opacity 0.5s ease, transform 0.5s ease, border-color 0.3s, background 0.3s;
    }
    .member-row--new.visible { opacity: 1; transform: translateX(0); }
    .member-row--new.settled { border-color: rgba(32,201,151,0.28); background: rgba(32,201,151,0.05); }

    .av {
      width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800;
    }
    .av-b  { background: rgba(86,216,255,0.14); color: #56d8ff; border: 1px solid rgba(86,216,255,0.28); }
    .av-v  { background: rgba(167,139,250,0.14); color: #a78bfa; border: 1px solid rgba(167,139,250,0.28); }
    .av-g  { background: rgba(32,201,151,0.14); color: #20c997; border: 1px solid rgba(32,201,151,0.28); }
    .av-m  { background: rgba(86,216,255,0.20); color: #56d8ff; border: 2px solid rgba(86,216,255,0.50); }

    .m-name { font-size: 12px; font-weight: 700; }
    .m-meta { margin-left: auto; font-size: 10px; color: #4d5f77; }

    /* Schedule panel */
    .schedule-panel {
      flex: 1; min-height: 0; border: 1px solid rgba(255,255,255,0.08); border-radius: 20px;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015));
      overflow: hidden; display: flex; flex-direction: column;
      opacity: 0; animation: reveal 0.6s 0.27s ease forwards;
    }
    .sched-header {
      display: flex; align-items: center; gap: 9px; padding: 12px 15px;
      border-bottom: 1px solid rgba(255,255,255,0.07); background: rgba(255,255,255,0.02);
    }
    .sh-dot { width: 7px; height: 7px; border-radius: 50%; background: #56d8ff; box-shadow: 0 0 7px rgba(86,216,255,0.55); }
    .sh-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.13em; font-weight: 800; color: #56d8ff; }
    .sched-body { padding: 12px; display: flex; flex-direction: column; gap: 7px; flex: 1; }

    .sched-block {
      display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 11px;
      transition: border-color 0.5s, background 0.5s, box-shadow 0.5s;
    }
    .sb-a    { border: 1px solid rgba(32,201,151,0.25); background: rgba(32,201,151,0.06); }
    .sb-b    { border: 1px solid rgba(86,216,255,0.22); background: rgba(86,216,255,0.05); }
    .sb-a.updated { border-color: rgba(32,201,151,0.55); background: rgba(32,201,151,0.12); box-shadow: 0 0 18px rgba(32,201,151,0.18); }

    .label { font-size: 11px; font-weight: 700; }

    /* Narration area */
    .narration-area {
      padding: 14px 18px; border-radius: 14px;
      border: 1px solid rgba(167,139,250,0.18); background: rgba(167,139,250,0.07);
      display: flex; align-items: flex-start; gap: 12px;
      opacity: 0; animation: reveal 0.6s 0.4s ease forwards;
    }

    .narration-orb {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 3px;
      background: #a78bfa; box-shadow: 0 0 12px rgba(167,139,250,0.7);
      animation: blink 1.2s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.2;} }
    .narration-text { font-size: 13px; color: #c4b5fd; font-weight: 600; line-height: 1.5; }
    .cursor { display: inline-block; width: 2px; height: 0.85em; background: #a78bfa; margin-left: 1px; vertical-align: text-bottom; animation: blink-cursor 0.75s step-end infinite; }
    @keyframes blink-cursor { 0%,100%{opacity:1} 50%{opacity:0} }

    @keyframes reveal { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="bg-orb" id="bgOrb"></div>

  <div class="scene">
    <div class="header">
      <div class="header-dot" id="headerDot"></div>
      <div class="header-title" id="headerTitle">Rebalancing…</div>
      <div class="spacer"></div>
      <span class="status-badge" id="statusBadge">Adjusting</span>
    </div>

    <div class="main">
      <!-- Groups -->
      <div class="groups-panel">
        <div class="panel-header">
          <div class="ph-dot"></div>
          <span class="ph-title">Groups</span>
          <span class="ph-count" id="groupCount">3 groups</span>
        </div>
        <div class="panel-body">
          <div class="member-row">
            <div class="av av-b">E</div>
            <span class="m-name">Emma</span>
            <span class="m-meta">Group A</span>
          </div>
          <div class="member-row">
            <div class="av av-v">L</div>
            <span class="m-name">Liam</span>
            <span class="m-meta">Group A</span>
          </div>
          <div class="member-row" id="masonRow" style="opacity:0;transform:translateX(-10px);">
            <div class="av av-m">M</div>
            <span class="m-name">Mason</span>
            <span class="m-meta">Group A</span>
          </div>
          <div class="member-row">
            <div class="av av-g">S</div>
            <span class="m-name">Sophia</span>
            <span class="m-meta">Group B</span>
          </div>
          <div class="member-row">
            <div class="av av-b">A</div>
            <span class="m-name">Ava</span>
            <span class="m-meta">1:1</span>
          </div>
          <div class="member-row">
            <div class="av av-b">N</div>
            <span class="m-name">Noah</span>
            <span class="m-meta">1:1</span>
          </div>
        </div>
      </div>

      <!-- Schedule -->
      <div class="schedule-panel">
        <div class="sched-header">
          <div class="sh-dot"></div>
          <span class="sh-title">Updated Schedule</span>
        </div>
        <div class="sched-body">
          <div class="sched-block sb-a" id="block1">
            <span class="label">Mon 9–9:30</span>
            <span style="margin-left:auto;font-size:11px;color:#20c997;">Group A</span>
          </div>
          <div class="sched-block sb-a" id="block2">
            <span class="label">Tue 9–9:30</span>
            <span style="margin-left:auto;font-size:11px;color:#20c997;">Group A</span>
          </div>
          <div class="sched-block sb-b">
            <span class="label">Wed 9–9:30</span>
            <span style="margin-left:auto;font-size:11px;color:#56d8ff;">1:1 Ava</span>
          </div>
          <div class="sched-block sb-a" id="block3">
            <span class="label">Thu 9–9:30</span>
            <span style="margin-left:auto;font-size:11px;color:#20c997;">Group A</span>
          </div>
          <div class="sched-block sb-a" id="block4">
            <span class="label">Fri 9–9:30</span>
            <span style="margin-left:auto;font-size:11px;color:#20c997;">Group A</span>
          </div>
        </div>
      </div>
    </div>

    <div class="narration-area">
      <div class="narration-orb"></div>
      <div class="narration-text" id="narrationText"><span id="narr"></span><span class="cursor" id="cur"></span></div>
    </div>
  </div>

  <script>
    (async () => {
      const sleep = ms => new Promise(r => setTimeout(r, ms));
      const narr = document.getElementById('narr');
      const cur  = document.getElementById('cur');

      async function typewrite(text) {
        narr.textContent = '';
        for (const ch of text) { narr.textContent += ch; await sleep(20); }
      }

      // === BEAT 1: Detect ===
      await sleep(400);
      await typewrite(`"New constraint detected. I'm adjusting the schedule…"`);

      // === BEAT 2: Adjust ===
      await sleep(800);

      const masonRow = document.getElementById('masonRow');
      masonRow.classList.add('visible');

      document.getElementById('block1').classList.add('updated');
      document.getElementById('block2').classList.add('updated');
      document.getElementById('block3').classList.add('updated');
      document.getElementById('block4').classList.add('updated');

      document.getElementById('headerTitle').textContent = 'Rebalancing…';
      document.getElementById('headerTitle').classList.add('rebalancing');
      document.getElementById('headerDot').classList.add('rebalancing');
      document.getElementById('statusBadge').classList.add('active');
      document.getElementById('bgOrb').classList.add('active');

      await typewrite(`"I've adjusted everything so it still works. Mason joins Group A."`);

      // === BEAT 3: Confirm ===
      await sleep(2000);

      masonRow.classList.add('settled');

      document.getElementById('headerTitle').textContent = 'Rebalanced';
      document.getElementById('headerTitle').classList.remove('rebalancing');
      document.getElementById('headerDot').classList.remove('rebalancing');
      document.getElementById('headerDot').classList.add('done');
      document.getElementById('statusBadge').classList.remove('active');
      document.getElementById('statusBadge').classList.add('done');
      document.getElementById('statusBadge').textContent = 'Complete';

      await typewrite(`"Schedule updated. No conflicts introduced. All constraints maintained."`);
      cur.style.display = 'none';

      await sleep(1500);
      window.parent.postMessage({ type: 'rebalance:complete' }, '*');
    })();
  </script>
</body>
</html>
