<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Shift</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; background: #07111f; color: #edf4ff;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif; overflow: hidden;
    }

    body::before {
      content: ""; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(0,0,0,0.2));
      pointer-events: none;
    }

    /* Orbs */
    .orb { position: absolute; border-radius: 50%; filter: blur(90px); pointer-events: none; }
    .orb-1 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(255,106,106,0.10), transparent 70%); top: -80px; left: -80px; }
    .orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(32,201,151,0.12), transparent 70%); bottom: -80px; right: -80px; }

    .scene { position: relative; height: 100%; width: 100%; padding: 22px 28px; display: flex; flex-direction: column; gap: 16px; }

    .topbar {
      display: flex; align-items: center; gap: 12px; padding: 14px 18px;
      border: 1px solid rgba(255,255,255,0.08); border-radius: 18px;
      background: rgba(255,255,255,0.035);
      opacity: 0; animation: reveal 0.6s 0.1s ease forwards;
    }
    .topbar-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.18em; color: #a78bfa; font-weight: 800; }
    .topbar-title { font-size: 13px; font-weight: 700; color: #edf4ff; }
    .spacer { flex: 1; }
    .badge {
      padding: 4px 12px; border-radius: 999px; font-size: 11px; font-weight: 700;
      border: 1px solid rgba(167,139,250,0.30); background: rgba(167,139,250,0.10); color: #a78bfa;
    }

    /* Comparison table */
    .compare-panel {
      flex: 1; min-height: 0; border: 1px solid rgba(255,255,255,0.08); border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015));
      overflow: hidden;
      opacity: 0; animation: reveal 0.7s 0.2s ease forwards;
    }

    .compare-header {
      display: grid; grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .col-header {
      padding: 16px 24px; font-size: 12px; text-transform: uppercase;
      letter-spacing: 0.16em; font-weight: 800; text-align: center;
    }
    .col-header--before {
      color: #ff8f8f; border-right: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,106,106,0.05);
    }
    .col-header--after { color: #20c997; background: rgba(32,201,151,0.05); }

    .compare-body { padding: 8px 0; }

    .compare-row {
      display: grid; grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      opacity: 0; animation: reveal 0.5s ease forwards;
    }
    .compare-row:last-child { border-bottom: none; }

    .compare-cell {
      display: flex; align-items: center; gap: 14px; padding: 16px 24px;
    }
    .compare-cell--before { border-right: 1px solid rgba(255,255,255,0.06); }

    .cell-icon { font-size: 18px; flex-shrink: 0; }
    .cell-text { font-size: 15px; font-weight: 700; }
    .cell-text--before { color: #ff8f8f; }
    .cell-text--after  { color: #20c997; }

    .arrow-divider {
      display: flex; align-items: center; justify-content: center;
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.10); background: rgba(255,255,255,0.06);
      color: #a78bfa; font-size: 16px; z-index: 2;
    }

    /* Footer */
    .footer {
      padding: 14px 18px; border: 1px solid rgba(32,201,151,0.20); border-radius: 14px;
      background: rgba(32,201,151,0.06); text-align: center;
      font-size: 14px; font-weight: 700; color: #4eefc7;
      opacity: 0; animation: reveal 0.6s 0.65s ease forwards;
    }

    @keyframes reveal { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="scene">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="topbar">
      <span class="topbar-label">The Shift</span>
      <span class="topbar-title">From Constant Rework → Continuous Rebalancing</span>
      <div class="spacer"></div>
      <span class="badge">Paradigm Change</span>
    </div>

    <div class="compare-panel">
      <div class="compare-header">
        <div class="col-header col-header--before">Before</div>
        <div class="col-header col-header--after">After</div>
      </div>
      <div class="compare-body">
        <div class="compare-row" style="animation-delay:0.30s">
          <div class="compare-cell compare-cell--before">
            <span class="cell-icon">🔨</span>
            <span class="cell-text cell-text--before">Manual Scheduling</span>
          </div>
          <div class="compare-cell">
            <span class="cell-icon">🤖</span>
            <span class="cell-text cell-text--after">AI-Assisted Rebalancing</span>
          </div>
        </div>
        <div class="compare-row" style="animation-delay:0.40s">
          <div class="compare-cell compare-cell--before">
            <span class="cell-icon">🗿</span>
            <span class="cell-text cell-text--before">Static Plan</span>
          </div>
          <div class="compare-cell">
            <span class="cell-icon">⚡</span>
            <span class="cell-text cell-text--after">Dynamic System</span>
          </div>
        </div>
        <div class="compare-row" style="animation-delay:0.50s">
          <div class="compare-cell compare-cell--before">
            <span class="cell-icon">♻️</span>
            <span class="cell-text cell-text--before">Rebuild Everything</span>
          </div>
          <div class="compare-cell">
            <span class="cell-icon">🎯</span>
            <span class="cell-text cell-text--after">Adjust Incrementally</span>
          </div>
        </div>
        <div class="compare-row" style="animation-delay:0.60s">
          <div class="compare-cell compare-cell--before">
            <span class="cell-icon">🎲</span>
            <span class="cell-text cell-text--before">Guessing Tradeoffs</span>
          </div>
          <div class="compare-cell">
            <span class="cell-icon">💬</span>
            <span class="cell-text cell-text--after">Explained Decisions</span>
          </div>
        </div>
      </div>
    </div>

    <div class="footer"><span id="fnarr"></span></div>
  </div>
  <script>
    (async () => {
      const sleep = ms => new Promise(r => setTimeout(r, ms));
      await sleep(1200);
      const el = document.getElementById('fnarr');
      for (const ch of '"Don\'t rebuild the schedule. Rebalance it."') { el.textContent += ch; await sleep(22); }
    })();
  </script>
</body>
</html>
