<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Before vs After</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; background: #07111f; color: #edf4ff;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif; overflow: hidden;
    }
    body::before {
      content: ""; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.2));
      pointer-events: none;
    }

    /* Ambient orbs */
    .orb { position: absolute; border-radius: 50%; filter: blur(80px); pointer-events: none; }
    .orb-before { width: 380px; height: 380px; background: radial-gradient(circle, rgba(255,106,106,0.10), transparent 70%); top: -60px; left: -60px; }
    .orb-after  { width: 380px; height: 380px; background: radial-gradient(circle, rgba(32,201,151,0.12), transparent 70%); bottom: -60px; right: -60px; }

    .scene { position: relative; height: 100%; width: 100%; padding: 22px 28px; display: flex; flex-direction: column; gap: 16px; }

    .topbar {
      display: flex; align-items: center; gap: 12px; padding: 14px 18px;
      border: 1px solid rgba(255,255,255,0.08); border-radius: 18px;
      background: rgba(255,255,255,0.035);
      opacity: 0; animation: reveal 0.6s 0.1s ease forwards;
    }
    .topbar-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.18em; color: #a78bfa; font-weight: 800; }
    .topbar-title { font-size: 13px; font-weight: 700; color: #edf4ff; }
    .spacer { flex: 1; }

    /* Compare panel */
    .compare-panel {
      flex: 1; min-height: 0; border: 1px solid rgba(255,255,255,0.08); border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015));
      overflow: hidden;
      opacity: 0; animation: reveal 0.7s 0.2s ease forwards;
    }

    .col-headers {
      display: grid; grid-template-columns: 1fr 48px 1fr;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .col-h {
      padding: 14px 20px; font-size: 12px; text-transform: uppercase;
      letter-spacing: 0.16em; font-weight: 800; text-align: center;
    }
    .col-h--before { color: #ff8f8f; background: rgba(255,106,106,0.04); }
    .col-h--divider { display: flex; align-items: center; justify-content: center; border-left: 1px solid rgba(255,255,255,0.06); border-right: 1px solid rgba(255,255,255,0.06); }
    .col-h--after  { color: #20c997; background: rgba(32,201,151,0.04); }

    .compare-rows {}
    .compare-row {
      display: grid; grid-template-columns: 1fr 48px 1fr;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      opacity: 0; animation: reveal 0.5s ease forwards;
    }
    .compare-row:last-child { border-bottom: none; }

    .cell {
      display: flex; align-items: center; gap: 12px; padding: 16px 20px;
    }
    .cell--before { border-right: none; }
    .cell--divider {
      display: flex; align-items: center; justify-content: center;
      border-left: 1px solid rgba(255,255,255,0.05); border-right: 1px solid rgba(255,255,255,0.05);
      color: #4d5f77; font-size: 14px;
    }

    .cell-icon { font-size: 18px; flex-shrink: 0; }
    .cell-val { font-size: 15px; font-weight: 700; }
    .val-before { color: #ff8f8f; }
    .val-after  { color: #20c997; }

    /* Footer */
    .footer {
      padding: 14px 18px; border: 1px solid rgba(32,201,151,0.20); border-radius: 14px;
      background: rgba(32,201,151,0.06); text-align: center;
      font-size: 15px; font-weight: 800; color: #4eefc7;
      opacity: 0; animation: reveal 0.6s 0.75s ease forwards;
    }

    @keyframes reveal { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="scene">
    <div class="orb orb-before"></div>
    <div class="orb orb-after"></div>

    <div class="topbar">
      <span class="topbar-label">Outcome</span>
      <span class="topbar-title">Before vs After</span>
      <div class="spacer"></div>
    </div>

    <div class="compare-panel">
      <div class="col-headers">
        <div class="col-h col-h--before">Before</div>
        <div class="col-h col-h--divider"></div>
        <div class="col-h col-h--after">After</div>
      </div>
      <div class="compare-rows">
        <div class="compare-row" style="animation-delay:0.28s">
          <div class="cell cell--before">
            <span class="cell-icon">♻️</span>
            <span class="cell-val val-before">Rebuild everything</span>
          </div>
          <div class="cell cell--divider">→</div>
          <div class="cell">
            <span class="cell-icon">🎯</span>
            <span class="cell-val val-after">Adjust incrementally</span>
          </div>
        </div>
        <div class="compare-row" style="animation-delay:0.37s">
          <div class="cell cell--before">
            <span class="cell-icon">⏳</span>
            <span class="cell-val val-before">Hours per change</span>
          </div>
          <div class="cell cell--divider">→</div>
          <div class="cell">
            <span class="cell-icon">⚡</span>
            <span class="cell-val val-after">Seconds per change</span>
          </div>
        </div>
        <div class="compare-row" style="animation-delay:0.46s">
          <div class="cell cell--before">
            <span class="cell-icon">🧠</span>
            <span class="cell-val val-before">Manual reasoning</span>
          </div>
          <div class="cell cell--divider">→</div>
          <div class="cell">
            <span class="cell-icon">🤖</span>
            <span class="cell-val val-after">AI-assisted decisions</span>
          </div>
        </div>
        <div class="compare-row" style="animation-delay:0.55s">
          <div class="cell cell--before">
            <span class="cell-icon">🙈</span>
            <span class="cell-val val-before">Hidden conflicts</span>
          </div>
          <div class="cell cell--divider">→</div>
          <div class="cell">
            <span class="cell-icon">🔍</span>
            <span class="cell-val val-after">Explicit constraints</span>
          </div>
        </div>
        <div class="compare-row" style="animation-delay:0.64s">
          <div class="cell cell--before">
            <span class="cell-icon">😰</span>
            <span class="cell-val val-before">Stressful</span>
          </div>
          <div class="cell cell--divider">→</div>
          <div class="cell">
            <span class="cell-icon">🧘</span>
            <span class="cell-val val-after">Controlled</span>
          </div>
        </div>
      </div>
    </div>

    <div class="footer"><span id="fnarr"></span></div>
  </div>
  <script>
    (async () => {
      const sleep = ms => new Promise(r => setTimeout(r, ms));
      await sleep(1800);
      const el = document.getElementById('fnarr');
      for (const ch of '"You are no longer managing chaos."') { el.textContent += ch; await sleep(22); }
    })();
  </script>
</body>
</html>
