<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Load Your Students (Effortlessly)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; background: #07111f; color: #edf4ff;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif; overflow: hidden;
    }
    body::before {
      content: ""; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.2));
      pointer-events: none;
    }

    .scene { position: relative; height: 100%; display: flex; flex-direction: column; padding: 22px 28px; gap: 16px; }

    .topbar {
      display: flex; align-items: center; gap: 12px; padding: 14px 18px;
      border: 1px solid rgba(255,255,255,0.08); border-radius: 18px;
      background: rgba(255,255,255,0.035);
      opacity: 0; animation: reveal 0.6s 0.1s ease forwards;
    }
    .step-badge {
      padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 800;
      border: 1px solid rgba(167,139,250,0.30); background: rgba(167,139,250,0.10); color: #a78bfa;
    }
    .topbar-title { font-size: 13px; font-weight: 700; color: #edf4ff; }
    .spacer { flex: 1; }
    .badge-highlight {
      padding: 4px 12px; border-radius: 999px; font-size: 11px; font-weight: 700;
      border: 1px solid rgba(86,216,255,0.30); background: rgba(86,216,255,0.10); color: #56d8ff;
    }

    .main-grid {
      flex: 1; min-height: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    }

    /* Left side — Paste area */
    .input-panel {
      border: 1px solid rgba(167,139,250,0.22); border-radius: 20px;
      background: linear-gradient(135deg, rgba(167,139,250,0.08), rgba(86,216,255,0.05));
      overflow: hidden; display: flex; flex-direction: column;
      opacity: 0; animation: reveal 0.6s 0.2s ease forwards;
    }

    .input-header {
      display: flex; align-items: center; gap: 9px; padding: 12px 15px;
      border-bottom: 1px solid rgba(255,255,255,0.07); background: rgba(255,255,255,0.02);
    }
    .input-icon { font-size: 14px; }
    .input-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.13em; font-weight: 800; color: #a78bfa; }

    .textarea-area {
      padding: 14px; flex: 1; overflow: hidden; display: flex; flex-direction: column;
    }

    .messy-text {
      font-size: 12px; color: #c4b5fd; line-height: 1.7; font-family: 'Monaco', 'Menlo', monospace;
      white-space: pre-wrap; word-break: break-word;
      opacity: 0.7;
    }

    .input-controls {
      display: flex; gap: 8px; padding: 12px 14px; border-top: 1px solid rgba(255,255,255,0.06);
    }

    .button-secondary {
      flex: 1; padding: 8px 12px; border-radius: 10px; border: 1px solid rgba(167,139,250,0.25);
      background: rgba(167,139,250,0.08); color: #c4b5fd; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.3s ease;
    }
    .button-secondary:hover {
      border-color: rgba(167,139,250,0.40); background: rgba(167,139,250,0.13);
    }

    /* Right side — Preview cards */
    .preview-panel {
      border: 1px solid rgba(255,255,255,0.08); border-radius: 20px;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015));
      overflow: hidden; display: flex; flex-direction: column;
      opacity: 0; animation: reveal 0.6s 0.25s ease forwards;
    }

    .preview-header {
      display: flex; align-items: center; gap: 9px; padding: 12px 15px;
      border-bottom: 1px solid rgba(255,255,255,0.07); background: rgba(255,255,255,0.02);
    }
    .preview-dot { width: 7px; height: 7px; border-radius: 50%; background: #56d8ff; box-shadow: 0 0 7px rgba(86,216,255,0.55); }
    .preview-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.13em; font-weight: 800; color: #56d8ff; }

    .preview-body { padding: 12px; display: flex; flex-direction: column; gap: 8px; flex: 1; overflow: auto; }

    .student-card {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 11px;
      border: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.03);
      opacity: 0; transform: translateX(10px);
      animation: card-slide-in 0.5s ease forwards;
    }
    .student-card:nth-child(1) { animation-delay: 0.55s; }
    .student-card:nth-child(2) { animation-delay: 0.80s; }
    .student-card:nth-child(3) { animation-delay: 1.05s; }
    .student-card:nth-child(4) { animation-delay: 1.30s; }
    .student-card:nth-child(5) { animation-delay: 1.55s; }

    .avatar {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800;
    }
    .av-e { background: rgba(86,216,255,0.14); color: #56d8ff; border: 1px solid rgba(86,216,255,0.28); }
    .av-l { background: rgba(167,139,250,0.14); color: #a78bfa; border: 1px solid rgba(167,139,250,0.28); }
    .av-s { background: rgba(32,201,151,0.14); color: #20c997; border: 1px solid rgba(32,201,151,0.28); }
    .av-a { background: rgba(255,125,184,0.14); color: #ff7db8; border: 1px solid rgba(255,125,184,0.28); }
    .av-n { background: rgba(245,185,76,0.14); color: #f5b94c; border: 1px solid rgba(245,185,76,0.28); }

    .card-info { flex: 1; min-width: 0; }
    .card-name { font-size: 12px; font-weight: 700; color: #edf4ff; }
    .card-meta { font-size: 10px; color: #70819a; }

    /* Narration */
    .narration-bar {
      padding: 14px 18px; border-radius: 14px;
      border: 1px solid rgba(167,139,250,0.18); background: rgba(167,139,250,0.07);
      display: flex; align-items: flex-start; gap: 12px;
      opacity: 0; animation: reveal 0.6s 0.35s ease forwards;
    }

    .narration-orb {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 3px;
      background: #a78bfa; box-shadow: 0 0 12px rgba(167,139,250,0.7);
      animation: blink-dot 1.2s step-end infinite;
    }
    @keyframes blink-dot { 0%,100%{opacity:1;} 50%{opacity:0.2;} }

    .narration-text { font-size: 13px; color: #c4b5fd; font-weight: 600; line-height: 1.5; }
    .cursor { display: inline-block; width: 2px; height: 0.85em; background: #a78bfa; margin-left: 1px; vertical-align: text-bottom; animation: blink-cursor 0.75s step-end infinite; }
    @keyframes blink-cursor { 0%,100%{opacity:1} 50%{opacity:0} }

    /* Action area */
    .action-area {
      display: flex; justify-content: center;
    }

    .button-primary {
      padding: 12px 32px; border-radius: 14px; border: 1px solid rgba(32,201,151,0.30);
      background: linear-gradient(135deg, rgba(32,201,151,0.15), rgba(32,201,151,0.10));
      color: #20c997; font-size: 14px; font-weight: 700; letter-spacing: 0.04em;
      cursor: pointer; transition: all 0.3s ease;
      display: flex; align-items: center; gap: 8px;
    }
    .button-primary:hover {
      border-color: rgba(32,201,151,0.50);
      background: linear-gradient(135deg, rgba(32,201,151,0.25), rgba(32,201,151,0.15));
      box-shadow: 0 0 20px rgba(32,201,151,0.25);
    }
    .button-primary:active { transform: scale(0.98); }

    .spinner {
      width: 14px; height: 14px; border: 2px solid rgba(32,201,151,0.2);
      border-top-color: #20c997; border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }
    .spinner.active { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes reveal { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes card-slide-in { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
  </style>
</head>
<body>
  <div class="scene">
    <div class="topbar">
      <span class="step-badge">SETUP</span>
      <span class="topbar-title">Load Your Students</span>
      <div class="spacer"></div>
      <span class="badge-highlight">Parsed automatically</span>
    </div>

    <div class="main-grid">
      <!-- LEFT: Input area -->
      <div class="input-panel">
        <div class="input-header">
          <span class="input-icon">📋</span>
          <span class="input-title">Paste or Upload</span>
        </div>
        <div class="textarea-area">
          <div class="messy-text">Emma - Grade 3 - 120 min
Liam - Grade 3 - Group eligible
Sophia - Grade 4 - 150 min
Ava - Grade 4 - Needs 1:1
Noah - Grade 5 - No mornings</div>
        </div>
        <div class="input-controls">
          <button class="button-secondary">Paste Text</button>
          <button class="button-secondary">Upload File</button>
        </div>
      </div>

      <!-- RIGHT: Preview cards -->
      <div class="preview-panel">
        <div class="preview-header">
          <div class="preview-dot"></div>
          <span class="preview-title">Preview</span>
        </div>
        <div class="preview-body" id="previewBody">
          <!-- Cards will be inserted here -->
        </div>
      </div>
    </div>

    <div class="narration-bar">
      <div class="narration-orb"></div>
      <div class="narration-text"><span id="narr"></span><span class="cursor" id="cur"></span></div>
    </div>

    <div class="action-area">
      <button class="button-primary" onclick="importStudents()">
        <span class="spinner" id="spinner"></span>
        <span id="button-text">[ Import Students → ]</span>
      </button>
    </div>
  </div>

  <script>
    const studentData = [
      { name: 'Emma', grade: 'Grade 3', meta: '120 min/wk' },
      { name: 'Liam', grade: 'Grade 3', meta: 'Group eligible' },
      { name: 'Sophia', grade: 'Grade 4', meta: '150 min/wk' },
      { name: 'Ava', grade: 'Grade 4', meta: 'Needs 1:1' },
      { name: 'Noah', grade: 'Grade 5', meta: 'No mornings' }
    ];

    const avatarClasses = ['av-e', 'av-l', 'av-s', 'av-a', 'av-n'];
    const initials = ['E', 'L', 'S', 'A', 'N'];

    (async () => {
      const sleep = ms => new Promise(r => setTimeout(r, ms));
      const narr = document.getElementById('narr');
      const cur = document.getElementById('cur');

      async function typewrite(text) {
        for (const ch of text) { narr.textContent += ch; await sleep(20); }
      }

      // Start narration after UI settles
      await sleep(1500);
      await typewrite(`"Just paste your student list — even if it's messy. I'll structure everything for you."`);
      cur.style.display = 'none';
    })();

    function importStudents() {
      const btn = document.querySelector('.button-primary');
      const spinner = document.getElementById('spinner');
      const text = document.getElementById('button-text');
      const previewBody = document.getElementById('previewBody');

      btn.disabled = true;
      spinner.classList.add('active');
      text.textContent = 'Processing…';

      (async () => {
        const sleep = ms => new Promise(r => setTimeout(r, ms));

        // Clear preview
        previewBody.innerHTML = '';

        // Show processing message briefly
        await sleep(600);

        // Create and animate cards one-by-one
        for (let i = 0; i < studentData.length; i++) {
          const card = document.createElement('div');
          card.className = 'student-card';
          card.innerHTML = `
            <div class="avatar ${avatarClasses[i]}">${initials[i]}</div>
            <div class="card-info">
              <div class="card-name">${studentData[i].name}</div>
              <div class="card-meta">${studentData[i].grade} · ${studentData[i].meta}</div>
            </div>
          `;
          previewBody.appendChild(card);
          await sleep(250);
        }

        // Wait before auto-advancing
        await sleep(1500);
        window.parent.postMessage({ type: 'students:loaded' }, '*');
      })();
    }
  </script>
</body>
</html>
