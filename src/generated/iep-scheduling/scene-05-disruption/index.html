<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add New Student</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; background: #07111f; color: #edf4ff;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif; overflow: hidden;
    }
    body::before {
      content: ""; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.2));
      pointer-events: none;
    }

    .alert-orb {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(86,216,255,0.08), transparent 70%);
      filter: blur(40px);
      animation: pulse-orb 2.5s ease-in-out infinite;
    }
    @keyframes pulse-orb {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.08); }
    }

    .scene {
      position: relative; height: 100%; width: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 20px; padding: 40px;
    }

    .alert-banner {
      display: flex; align-items: center; gap: 14px; padding: 16px 24px;
      border: 1px solid rgba(86,216,255,0.40); border-radius: 16px;
      background: rgba(86,216,255,0.12); max-width: 560px; width: 100%;
      opacity: 0; animation: slide-down 0.6s 0.1s ease forwards;
    }
    .alert-icon { font-size: 22px; flex-shrink: 0; }
    .alert-title { font-size: 16px; font-weight: 800; color: #56d8ff; }
    .alert-sub { font-size: 12px; color: #56d8ff; opacity: 0.8; margin-top: 2px; }

    .student-card {
      max-width: 560px; width: 100%;
      border: 1px solid rgba(255,255,255,0.10); border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      overflow: hidden;
      opacity: 0; animation: slide-up 0.7s 0.3s ease forwards;
    }
    .card-header {
      display: flex; align-items: center; gap: 14px; padding: 16px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.025);
    }
    .new-avatar {
      width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800;
      background: rgba(86,216,255,0.15); color: #56d8ff; border: 2px solid rgba(86,216,255,0.35);
    }
    .card-name { font-size: 18px; font-weight: 800; color: #edf4ff; }
    .card-sub { font-size: 12px; color: #70819a; margin-top: 2px; }
    .new-badge {
      margin-left: auto; padding: 4px 12px; border-radius: 999px; font-size: 11px; font-weight: 800;
      border: 1px solid rgba(86,216,255,0.35); background: rgba(86,216,255,0.12); color: #56d8ff;
    }

    .card-body { padding: 16px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .detail-item {
      display: flex; flex-direction: column; gap: 4px; padding: 12px 14px;
      border-radius: 12px; border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.03);
    }
    .detail-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; color: #4d5f77; font-weight: 700; }
    .detail-value { font-size: 14px; font-weight: 700; color: #edf4ff; }
    .detail-value--cyan  { color: #56d8ff; }
    .detail-value--green { color: #20c997; }

    /* System message */
    .system-msg {
      max-width: 560px; width: 100%;
      display: flex; align-items: center; gap: 12px; padding: 14px 20px;
      border: 1px solid rgba(167,139,250,0.25); border-radius: 14px;
      background: rgba(167,139,250,0.07);
      opacity: 0; animation: slide-up 0.6s 0.55s ease forwards;
    }
    .sys-orb {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
      background: #a78bfa; box-shadow: 0 0 12px rgba(167,139,250,0.7);
      animation: blink 1.2s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.2;} }
    .sys-text { font-size: 13px; color: #c4b5fd; font-weight: 600; }
    .cursor { display: inline-block; width: 2px; height: 0.85em; background: #a78bfa; margin-left: 1px; vertical-align: text-bottom; animation: blink-cursor 0.75s step-end infinite; }
    @keyframes blink-cursor { 0%,100%{opacity:1} 50%{opacity:0} }

    /* Action button */
    .action-area {
      max-width: 560px; width: 100%;
      display: flex; justify-content: center;
      opacity: 0; animation: slide-up 0.6s 0.7s ease forwards;
    }

    .button-primary {
      padding: 12px 32px; border-radius: 14px; border: 1px solid rgba(32,201,151,0.30);
      background: linear-gradient(135deg, rgba(32,201,151,0.15), rgba(32,201,151,0.10));
      color: #20c997; font-size: 14px; font-weight: 700; letter-spacing: 0.04em;
      cursor: pointer; transition: all 0.3s ease;
      display: flex; align-items: center; gap: 8px;
    }
    .button-primary:hover {
      border-color: rgba(32,201,151,0.50);
      background: linear-gradient(135deg, rgba(32,201,151,0.25), rgba(32,201,151,0.15));
      box-shadow: 0 0 20px rgba(32,201,151,0.25);
    }
    .button-primary:active {
      transform: scale(0.98);
    }

    .spinner {
      width: 14px; height: 14px; border: 2px solid rgba(32,201,151,0.2);
      border-top-color: #20c997; border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }
    .spinner.active { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes slide-down { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slide-up   { from { opacity: 0; transform: translateY(16px);  } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="scene">
    <div class="alert-orb"></div>

    <div class="alert-banner">
      <span class="alert-icon">📌</span>
      <div>
        <div class="alert-title">New Student Enrollment</div>
        <div class="alert-sub">Ready to be added to the schedule</div>
      </div>
    </div>

    <div class="student-card">
      <div class="card-header">
        <div class="new-avatar">M</div>
        <div>
          <div class="card-name">Mason</div>
          <div class="card-sub">New enrollment</div>
        </div>
        <span class="new-badge">NEW</span>
      </div>
      <div class="card-body">
        <div class="detail-item">
          <div class="detail-label">Grade</div>
          <div class="detail-value">Grade 3</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Support Type</div>
          <div class="detail-value">Reading Support</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Minutes / Week</div>
          <div class="detail-value detail-value--cyan">120 min/wk</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Can be grouped?</div>
          <div class="detail-value detail-value--green">Yes</div>
        </div>
      </div>
    </div>

    <div class="system-msg">
      <div class="sys-orb"></div>
      <span class="sys-text"><span id="narr"></span><span class="cursor" id="cur"></span></span>
    </div>

    <div class="action-area">
      <button class="button-primary" onclick="addToSchedule()">
        <span class="spinner" id="spinner"></span>
        <span id="button-text">[ Add to Schedule ]</span>
      </button>
    </div>
  </div>

  <script>
    const sleep = ms => new Promise(r => setTimeout(r, ms));
    const narr = document.getElementById('narr');
    const cur  = document.getElementById('cur');

    async function typewrite(text) {
      for (const ch of text) { narr.textContent += ch; await sleep(20); }
    }

    (async () => {
      await sleep(1200);
      await typewrite(`"New constraint detected. I'll take care of rebalancing."`);
      cur.style.display = 'none';
    })();

    function addToSchedule() {
      const btn = document.querySelector('.button-primary');
      const spinner = document.getElementById('spinner');
      const text = document.getElementById('button-text');
      
      btn.disabled = true;
      spinner.classList.add('active');
      text.textContent = 'Adding…';
      
      setTimeout(() => {
        window.parent.postMessage({ type: 'student:added' }, '*');
      }, 1200);
    }
  </script>
</body>
</html>
