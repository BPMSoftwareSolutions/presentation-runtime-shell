<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome & Student Roster</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; background: #07111f; color: #edf4ff;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif; overflow: hidden;
    }

    body::before {
      content: ""; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(0,0,0,0.25));
      pointer-events: none;
    }

    .orb {
      position: absolute; width: 500px; height: 500px; border-radius: 50%;
      filter: blur(100px); pointer-events: none;
      background: radial-gradient(circle, rgba(139,92,246,0.12), transparent 70%);
      top: -160px; left: -140px;
    }

    .scene {
      position: relative; height: 100%; width: 100%;
      display: flex; flex-direction: column; padding: 24px 28px; gap: 16px;
    }

    /* Header */
    .header {
      display: flex; align-items: center; gap: 12px; padding: 12px 18px;
      border-radius: 16px; border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      opacity: 0; animation: reveal 0.5s 0.1s ease forwards;
    }
    .header-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #a78bfa; box-shadow: 0 0 8px rgba(167,139,250,0.6);
    }
    .header-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.16em; font-weight: 800; color: #a78bfa; }

    /* Main - two columns */
    .main {
      flex: 1; min-height: 0; display: grid;
      grid-template-columns: 1.2fr 0.8fr; gap: 16px;
    }

    /* Student roster */
    .roster-panel {
      border: 1px solid rgba(255,255,255,0.08); border-radius: 20px;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015));
      overflow: hidden; display: flex; flex-direction: column;
      opacity: 0; animation: reveal 0.6s 0.2s ease forwards;
    }

    .roster-header {
      padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.02);
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em;
      font-weight: 800; color: #56d8ff;
    }

    .student-grid {
      padding: 12px; display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 10px; flex: 1; min-height: 0; overflow-y: auto;
    }

    .student-card {
      border: 1px solid rgba(255,255,255,0.08); border-radius: 14px;
      background: rgba(255,255,255,0.03); padding: 12px;
      display: flex; align-items: center; gap: 10px;
      opacity: 0; animation: reveal 0.5s ease forwards;
    }

    .avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800;
    }
    .av-blue   { background: rgba(86,216,255,0.15); color: #56d8ff; border: 1px solid rgba(86,216,255,0.25); }
    .av-violet { background: rgba(167,139,250,0.15); color: #a78bfa; border: 1px solid rgba(167,139,250,0.25); }
    .av-green  { background: rgba(32,201,151,0.15); color: #20c997; border: 1px solid rgba(32,201,151,0.25); }
    .av-rose   { background: rgba(255,125,184,0.15); color: #ff7db8; border: 1px solid rgba(255,125,184,0.25); }

    .card-info { display: flex; flex-direction: column; gap: 2px; }
    .card-name { font-size: 12px; font-weight: 700; }
    .card-meta { font-size: 10px; color: #70819a; }

    /* Right panel - context */
    .context-panel {
      border: 1px solid rgba(167,139,250,0.18); border-radius: 20px;
      background: linear-gradient(135deg, rgba(167,139,250,0.07), rgba(86,216,255,0.04));
      padding: 16px; display: flex; flex-direction: column; gap: 12px;
      opacity: 0; animation: reveal 0.6s 0.25s ease forwards;
    }

    .context-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; font-weight: 800; color: #a78bfa; }

    .stat-row {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px;
      border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);
      background: rgba(255,255,255,0.02);
      font-size: 13px; font-weight: 700;
    }

    .stat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-blue   { background: #56d8ff; }
    .dot-violet { background: #a78bfa; }

    .stat-label { flex: 1; }
    .stat-value { color: #70819a; font-size: 12px; }

    /* Narration bar */
    .narration-bar {
      padding: 14px 18px; border-radius: 14px;
      border: 1px solid rgba(167,139,250,0.18);
      background: rgba(167,139,250,0.07); display: flex; align-items: flex-start; gap: 12px;
      opacity: 0; animation: reveal 0.6s 0.4s ease forwards;
    }

    .narration-orb {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 3px;
      background: #a78bfa; box-shadow: 0 0 12px rgba(167,139,250,0.7);
      animation: blink-dot 1.2s step-end infinite;
    }
    @keyframes blink-dot { 0%,100%{opacity:1;} 50%{opacity:0.2;} }

    .narration-text { font-size: 13px; color: #c4b5fd; font-weight: 600; line-height: 1.5; }
    .cursor { display: inline-block; width: 2px; height: 0.85em; background: #a78bfa; margin-left: 1px; vertical-align: text-bottom; animation: blink-cursor 0.75s step-end infinite; }
    @keyframes blink-cursor { 0%,100%{opacity:1} 50%{opacity:0} }

    @keyframes reveal { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="orb"></div>

  <div class="scene">
    <div class="header">
      <div class="header-dot"></div>
      <div class="header-title">Your Students</div>
    </div>

    <div class="main">
      <div class="roster-panel">
        <div class="roster-header">5 students • 600 minutes/week</div>
        <div class="student-grid">
          <div class="student-card" style="animation-delay:0.28s">
            <div class="avatar av-blue">E</div>
            <div class="card-info">
              <div class="card-name">Emma</div>
              <div class="card-meta">Grade 3 · 120 min</div>
            </div>
          </div>

          <div class="student-card" style="animation-delay:0.32s">
            <div class="avatar av-violet">L</div>
            <div class="card-info">
              <div class="card-name">Liam</div>
              <div class="card-meta">Grade 3 · 120 min</div>
            </div>
          </div>

          <div class="student-card" style="animation-delay:0.36s">
            <div class="avatar av-green">S</div>
            <div class="card-info">
              <div class="card-name">Sophia</div>
              <div class="card-meta">Grade 4 · 150 min</div>
            </div>
          </div>

          <div class="student-card" style="animation-delay:0.40s">
            <div class="avatar av-rose">A</div>
            <div class="card-info">
              <div class="card-name">Ava</div>
              <div class="card-meta">Grade 4 · 120 min</div>
            </div>
          </div>

          <div class="student-card" style="animation-delay:0.44s">
            <div class="avatar av-blue">N</div>
            <div class="card-info">
              <div class="card-name">Noah</div>
              <div class="card-meta">Grade 5 · 90 min</div>
            </div>
          </div>
        </div>
      </div>

      <div class="context-panel">
        <div class="context-label">This Week</div>

        <div class="stat-row">
          <div class="stat-dot dot-blue"></div>
          <span class="stat-label">Total load</span>
          <span class="stat-value">600 min</span>
        </div>

        <div class="stat-row">
          <div class="stat-dot dot-violet"></div>
          <span class="stat-label">Time slots</span>
          <span class="stat-value">5 daily</span>
        </div>

        <div style="flex: 1;"></div>

        <div style="padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.08); color: #70819a; font-size: 12px; line-height: 1.5;">
          Your roster is ready. Let's organize these students into efficient groups.
        </div>
      </div>
    </div>

    <div class="narration-bar">
      <div class="narration-orb"></div>
      <div class="narration-text"><span id="narr"></span><span class="cursor" id="cur"></span></div>
    </div>
  </div>

  <script>
    (async () => {
      const sleep = ms => new Promise(r => setTimeout(r, ms));
      const narr = document.getElementById('narr');
      const cur  = document.getElementById('cur');

      async function typewrite(text) {
        for (const ch of text) { narr.textContent += ch; await sleep(20); }
      }

      await sleep(500);
      await typewrite(`"Let's build your schedule from the students you already support."`);
      cur.style.display = 'none';

      await sleep(6500);
      window.parent.postMessage({ type: 'roster:displayed' }, '*');
    })();
  </script>
</body>
</html>
